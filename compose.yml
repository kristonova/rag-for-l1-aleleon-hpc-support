# =============================================================================
# podman-compose.yml — RAG + vLLM + Embedding Service + ChromaDB for AMD GPU (ROCm)
# =============================================================================
# Usage:
#   # Start all services with test profile
#   podman-compose --profile test up
#   
#   # Start individual services
#   podman-compose --profile embedding up embedding-service
#   podman-compose --profile vllm-rocm up vllm-rocm
#   podman-compose --profile chromadb up chromadb
#   
#   # Run RAG application
#   podman-compose --profile test run rag-app
# =============================================================================

services:
  # ---- Embedding Service (intfloat/multilingual-e5-large) ----
  # Menjalankan embedding model sebagai REST API (pasta networking)
  embedding-service:
    container_name: embedding-service
    build:
      context: .
      dockerfile: services/embedding/Dockerfile.embedding
    profiles:
      - model
      - backend
      - embedding-service
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - MODEL_NAME=intfloat/multilingual-e5-large
    restart: unless-stopped

  # ---- LLM Service (vLLM on ROCm) ----
  # Menjalankan LLM inference di GPU AMD dengan OpenAI-compatible API (pasta networking)
  vllm-rocm:
    image: docker.io/rocm/vllm-dev:nightly
    container_name: vllm-rocm
    profiles:
      - model
      - backend
      - vllm-rocm
    devices:
      - /dev/kfd       # Kernel Fusion Driver (wajib ROCm)
      - /dev/dri       # Direct Rendering Infrastructure
    group_add:
      - keep-groups
    cap_add:
      - SYS_PTRACE
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      - FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    command: >
      vllm serve
      --model Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      --dtype float16
      --gpu-memory-utilization 0.80
      --max-model-len 262144
      --tensor-parallel-size 1
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --trust-remote-code
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # Model loading bisa lama

  # ---- ChromaDB Vector Store ----
  # Persistent vector database untuk embeddings (ChromaDB v2 API) (pasta networking)
  chromadb:
    image: docker.io/chromadb/chroma:latest
    container_name: chromadb
    profiles:
      - backend
      - chromadb
    ports:
      - "8002:8000"
    volumes:
      - chromadb-data:/chroma/data
    environment:
      - CHROMA_SERVER_AUTHN_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTHN_CREDENTIALS=your-secret-key
      - CHROMA_ADMIN_USER=admin
      - CHROMA_ADMIN_PASSWORD=admin-password
    command: ["run", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo >/dev/tcp/localhost/8000 && exit 0 || exit 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- RAG Application ----
  # Orkestrasi RAG chain menggunakan semua services (pasta networking)
  rag-app:
    build:
      context: .
      dockerfile: services/rag-app/Dockerfile.rag-app
    container_name: rag-app
    profiles:
      - rag-app
    environment:
      - EMBEDDING_API_URL=http://embedding-service:8001
      - LLM_API_URL=http://vllm-rocm:8000/v1
      - CHROMADB_URL=http://chromadb:8000
      - CHROMADB_AUTH_TOKEN=your-secret-key
    # depends_on:
    #   embedding-service:
    #     condition: service_healthy
    #   vllm-rocm:
    #     condition: service_healthy
    #   chromadb:
    #     condition: service_healthy
    stdin_open: true
    tty: true

networks:
  rag-network:
    driver: bridge

volumes:
  chromadb-data:
