# =============================================================================
# podman-compose.yml — RAG + vLLM + Embedding Service + Qdrant for AMD GPU (ROCm)
# =============================================================================
# Usage:
#   # Start all services with test profile
#   podman-compose --profile test up
#   
#   # Start individual services
#   podman-compose --profile embedding up embedding-service
#   podman-compose --profile vllm-rocm up vllm-rocm
#   podman-compose --profile qdrant up qdrant
#   
#   # Run RAG application
#   podman-compose --profile test run rag-app
# =============================================================================

services:
  # ---- Embedding Service (BAAI/bge-m3) ----
  # Menjalankan embedding model sebagai REST API (pasta networking)
  embedding-service:
    container_name: embedding-service
    build:
      context: .
      dockerfile: services/embedding/Dockerfile.embedding
    profiles:
      - model
      - backend
      - embedding-service
    ports:
      - "8001:8001"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    environment:
      - MODEL_NAME=BAAI/bge-m3
    restart: unless-stopped

  # ---- LLM Service (vLLM on ROCm) ----
  # Menjalankan LLM inference di GPU AMD dengan OpenAI-compatible API (pasta networking)
  vllm-rocm:
    image: docker.io/rocm/vllm-dev:nightly
    container_name: vllm-rocm
    profiles:
      - model
      - backend
      - vllm-rocm
    devices:
      - /dev/kfd       # Kernel Fusion Driver (wajib ROCm)
      - /dev/dri       # Direct Rendering Infrastructure
    group_add:
      - keep-groups
    cap_add:
      - SYS_PTRACE
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    environment:
      - FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
    command: >
      vllm serve
      --model Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      --dtype float16
      --enforce-eager
      --gpu-memory-utilization 0.99
      --max-model-len 50000
      --max-num-seqs 16
      --tensor-parallel-size 1
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --reasoning-parser qwen3
      --enable-prefix-caching
      --trust-remote-code
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s  # Model loading bisa lama

  # ---- Qdrant Vector Store ----
  # Persistent vector database untuk embeddings (Qdrant REST + gRPC API) (pasta networking)
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: qdrant
    profiles:
      - backend
      - qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=your-secret-key
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=100
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; IFS= read -r line <&3; case \"$$line\" in *200*) exit 0;; *) exit 1;; esac'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- RAG Application ----
  # Orkestrasi RAG chain menggunakan semua services (pasta networking)
  rag-app:
    build:
      context: .
      dockerfile: services/rag-app/Dockerfile.rag-app
    container_name: rag-app
    profiles:
      - rag-app
    environment:
      - EMBEDDING_API_URL=http://embedding-service:8001
      - LLM_API_URL=http://vllm-rocm:8000/v1
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=your-secret-key
    # depends_on:
    #   embedding-service:
    #     condition: service_healthy
    #   vllm-rocm:
    #     condition: service_healthy
    #   qdrant:
    #     condition: service_healthy
    stdin_open: true
    tty: true

  # ---- Benchmark Service ----
  # Perbandingan performa Dense vs Sparse vs Multi-Vector vs Hybrid retrieval
  # Usage:
  #   podman-compose --profile benchmark run benchmark                          # Full benchmark
  #   podman-compose --profile benchmark run benchmark --mode ingest            # Ingest only
  #   podman-compose --profile benchmark run benchmark --mode query --no-llm    # Query only, no LLM
  #   podman-compose --profile benchmark run benchmark --mode query --questions 5  # 5 questions only
  #   podman-compose --profile benchmark run benchmark --mode cleanup           # Delete collections
  benchmark:
    build:
      context: .
      dockerfile: services/benchmark_retrieval/Dockerfile.benchmark
    container_name: benchmark
    profiles:
      - benchmark
    environment:
      - EMBEDDING_API_URL=http://embedding-service:8001
      - LLM_API_URL=http://vllm-rocm:8000/v1
      - LLM_MODEL_NAME=Qwen/Qwen3.5-35B-A3B-GPTQ-Int4
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=your-secret-key
    volumes:
      - ./output/benchmark:/app/output/benchmark
    stdin_open: true
    tty: true

  # ---- RAG API Benchmark (TTFT / Latency) ----
  # Benchmark concurrency & latency untuk endpoint POST /ask
  # Usage:
  #   podman-compose --profile benchmark-ttft run benchmark-ttft
  #
  # Environment variables (semua optional):
  #   RAG_API_URL           - Target RAG API (default: http://rag-api:8080)
  #   NUM_REQUESTS          - Jumlah request per concurrency level (default: 69)
  #   CONCURRENCY_LEVELS    - Comma-separated concurrency levels (default: 1,2,4,8,16)
  #   HEALTH_CHECK_RETRIES  - Max retry health check (default: 30)
  #   HEALTH_CHECK_INTERVAL - Detik antar retry (default: 10)
  benchmark-ttft:
    build:
      context: .
      dockerfile: services/benchmark_ttft/Dockerfile.rag-bench
    container_name: benchmark-ttft
    profiles:
      - benchmark-ttft
    environment:
      - RAG_API_URL=http://rag-api:8080
      - NUM_REQUESTS=49
      - CONCURRENCY_LEVELS=1,2,4,8,16
      - HEALTH_CHECK_RETRIES=30
      - HEALTH_CHECK_INTERVAL=10
      - RESULT_DIR=/app/output/benchmark_ttft
    volumes:
      - ./output/benchmark_ttft:/app/output/benchmark_ttft

  # ---- RAG API Service ----
  rag-api:
    build:
      context: .
      dockerfile: services/rag-app/Dockerfile.rag-app
    container_name: rag-api
    profiles:
      - api
    ports:
      - "8080:8080"
    environment:
      - EMBEDDING_API_URL=http://embedding-service:8001
      - LLM_API_URL=http://vllm-rocm:8000/v1
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=your-secret-key
    depends_on:
      embedding-service:
        condition: service_healthy
      vllm-rocm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---- Telegram Bot ----
  telegram-bot:
    build:
      context: .
      dockerfile: services/telegram-bot/Dockerfile.telegram
    container_name: telegram-bot
    profiles:
      - telegram
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - RAG_API_URL=http://rag-api:8080
    depends_on:
      rag-api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pidof", "python"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rag-network:
    driver: bridge

volumes:
  qdrant-data:
