server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://172.16.1.10:3100/loki/api/v1/push

scrape_configs:

  - job_name: podman_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # This points to the mapped podman.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract the container name (removes the leading slash)
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'

      - source_labels: ['__meta_docker_container_label_logging_job']
        target_label: 'job'

      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

      - replacement: "${HOST_USER}"
        target_label: "user"